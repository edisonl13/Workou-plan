<html lang="zh">
<head>

  <title>Eddie · 增肌减脂 · 心率定制版</title>
  <style>

    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0f0f13;
      color:#e8e8f2;

    }
    .wrap{max-width:700px;margin:0 auto}
    h1{
      font-size:24px;font-weight:600;margin:8px 0 6px;

    }
    .subhead{

      border-left:3px solid #6a8fc0;padding-left:12px;

    .hr-card{

    .hr-badge{
      background:#3a2a4a;padding:6px 14px;border-radius:30px;

    .hr-detail{font-size:14px;color:#c0c0e0}
    .day-nav{display:flex;gap:8px;margin-bottom:20px}
    .day-btn{
      flex:1;padding:14px 6px;border-radius:36px;
      border:0.5px solid #3a3a55;background:transparent;
      font-size:15px;font-weight:600;color:#b0b0d0;
      cursor:pointer;transition:0.15s;
    }
    .day-btn.active{
      background:#2a3a60;border-color:#6a8fc0;color:#e0ecff;
    }
    .progress-badge{
      margin-left:auto;background:#1e1e2e;padding:6px 16px;
      border-radius:40px;font-size:16px;border:0.5px solid #4a4a70;
    }
    .phase{margin-bottom:28px}

    .phase-dot{width:12px;height:12px;border-radius:4px}

    .phase-title{font-size:18px;font-weight:600}

    .ex-card{

    .ex-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
    .ex-num{font-size:15px;color:#8f8fb0;min-width:26px}
    .ex-name{font-size:18px;font-weight:600;flex:1}
    .ex-badge{font-size:13px;padding:4px 12px;border-radius:30px}
    .b-db{background:#1e3a5a;color:#8db5f0}
    .b-bw{background:#1e3a2a;color:#7dba8a}
    .b-str{background:#3d2e1c;color:#e0a56f}
    .ex-weight{
      font-size:15px;background:#252540;padding:5px 14px;
      border-radius:30px;color:#e0e0ff;margin-left:8px;font-weight:500;
    }
    .ex-detail{
      margin-left:38px;font-size:16px;color:#c0c0e0;margin-bottom:6px;
    }
    .ex-tip{
      margin-left:38px;font-size:14.5px;color:#a0a0c8;font-style:italic;
      margin-bottom:8px;line-height:1.4;
    }
    .ex-hr{
      margin-left:38px;font-size:13.5px;color:#b8a0d0;
      background:#202035;padding:5px 12px;border-radius:20px;
      display:inline-block;margin-bottom:10px;
    }
    
    .set-tracker{
      display:flex;gap:14px;flex-wrap:wrap;margin-left:38px;align-items:center;
    }
    .set-dot{
      width:52px;height:52px;border-radius:52px;background:#202030;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:1.5px solid #3a3a60;font-weight:600;color:#c0c0e0;
      cursor:pointer;transition:0.1s;
    }
    .set-dot.completed{
      background:#2a5a7a;border-color:#7aaae0;color:white;
    }
    .set-num{font-size:12px;opacity:0.9}
    .set-rep{font-size:15px;font-weight:700}
    .ex-progress{margin-left:14px;font-size:15px;color:#b0b0e0;font-weight:500}
    
    .card-timer{
      margin-top:16px;margin-left:38px;background:#1e1e32;
      border-radius:40px;padding:10px 18px;display:flex;
      align-items:center;justify-content:space-between;
      border:0.5px solid #3a3a5e;
    }
    .timer-info{display:flex;align-items:center;gap:15px}
    .timer-label-small{font-size:15px;color:#b0b0e0}
    .timer-value{
      font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;
      color:#f0f0ff;letter-spacing:3px;
    }
    .timer-actions{display:flex;gap:10px}
    .timer-btn{
      background:#2a2a48;border:none;color:#d0d0f0;width:48px;height:48px;
      border-radius:48px;font-size:22px;display:flex;align-items:center;
      justify-content:center;cursor:pointer;border:0.5px solid #5a5a80;
    }
    
    .footer-bar{
      margin-top:28px;display:flex;gap:12px;
    }
    .reset-btn{
      background:transparent;border:1.5px solid #50507a;padding:16px;
      border-radius:50px;color:#c0c0e0;flex:1;font-size:17px;font-weight:500;
    }
    .note-box{
      background:#1a1a2a;border-radius:18px;padding:16px 18px;
      margin-top:20px;font-size:14.5px;color:#c0c0e0;line-height:1.6;
    }
  </style>
</head>
<body>
<div class="wrap">
<h1>🏋️ Eddie·增肌减脂
  <span class="progress-badge" id="dayProgress">0/0组</span>
</h1>
<div class="subhead">👤 男 · 36岁 · 170cm · 63kg · 膝盖敏感 · 上胸强化</div>

<!-- 心率参考卡 -->
<div class="hr-card">
  <span class="hr-badge">❤️ 最大心率 184</span>
  <span class="hr-detail">增肌有效区间 110–147 · 组间若＞150需延长休息</span>
</div>

<div class="day-nav">
  <button class="day-btn active" onclick="switchDay(0)">周一 Push</button>
  <button class="day-btn" onclick="switchDay(1)">周三 Pull</button>
  <button class="day-btn" onclick="switchDay(2)">周五 Legs</button>

<div id="day0"></div>
<div id="day1" style="display:none;"></div>

</div>
<div class="note-box">
  ⏱️ 点击组圆点标记完成，自动倒计时。拉伸结束有长提示音。<br>
  🧠 重量基于你的器械校准，若无法完成次数请降重。<br>
  📅 计划周期 8-12 周，若连续2周无法完成目标次数或膝盖不适加重，需重新评估。
</div>
</div>

<script>
  (function(){
    "use strict";
    
    // ----- Eddie 专属数据 (包含心率区间) -----
    const DAYS = ['push','pull','legs'];
    
    const EXERCISES = {
      push: {
        warm: [
          {name:'手臂绕环', sets:2, reps:'前后各10圈', tip:'手臂伸直画大圈', rest:30, type:'bw', weight:'', hr:'💓 100-120 热身区'},
          {name:'猫牛式', sets:2, reps:'10次', tip:'吸气拱背，呼气塌腰', rest:30, type:'bw', weight:'', hr:'💓 90-110 活动胸椎'},
          {name:'上斜俯卧撑(热身)', sets:2, reps:'10下', tip:'手撑沙发，激活上胸', rest:45, type:'bw', weight:'', hr:'💓 110-130 预热'},
          {name:'空手肩推', sets:2, reps:'15下', tip:'模拟肩推轨迹', rest:30, type:'bw', weight:'', hr:'💓 100-120 润滑关节'}
        ],
        main: [
          {name:'地板卧推(垫高背)', sets:4, reps:'10-12', tip:'下放4秒，推起1秒', rest:75, type:'db', weight:'10kg/边', hr:'💓 130-150 主项·复合动作心率偏高正常'},
          {name:'上斜俯卧撑', sets:3, reps:'力竭', tip:'手撑沙发，身体直线', rest:60, type:'bw', weight:'自重', hr:'💓 125-145 针对上胸'},
          {name:'哑铃站姿肩推', sets:3, reps:'12', tip:'核心收紧，直上直下', rest:60, type:'db', weight:'7.5-10kg/边', hr:'💓 120-140 稳定核心'},
          {name:'侧平举(小哑铃)', sets:3, reps:'20', tip:'1.5kg，手肘微弯', rest:45, type:'db', weight:'1.5kg/边', hr:'💓 110-130 孤立动作心率略低正常'},
          {name:'窄距俯卧撑', sets:3, reps:'8-10', tip:'手成钻石形', rest:60, type:'bw', weight:'自重', hr:'💓 120-140 三头'},
          {name:'哑铃飞鸟(地板)', sets:3, reps:'15', tip:'微弯肘，轻重量感受拉伸', rest:60, type:'db', weight:'5kg/边', hr:'💓 110-130 控制离心'}
        ],
        cool: [
          {name:'胸肌门框拉伸', sets:2, reps:'30秒/边', tip:'身体前倾', rest:30, type:'str', weight:'', hr:'💓 回落至100以下'},
          {name:'跨胸肩膀拉伸', sets:2, reps:'30秒/边', tip:'手肘压住', rest:30, type:'str', weight:'', hr:'💓 <100 放松'},
          {name:'三头过头拉伸', sets:2, reps:'30秒/边', tip:'轻压手肘', rest:30, type:'str', weight:'', hr:'💓 <100'},
          {name:'儿童式放松', sets:1, reps:'60秒', tip:'深呼吸', rest:60, type:'str', weight:'', hr:'💓 回落'}
        ]
      },
      pull: {
        warm: [
          {name:'猫牛式', sets:2, reps:'10次', tip:'活动胸椎', rest:30, type:'bw', weight:'', hr:'💓 90-110'},
          {name:'空手划船模拟', sets:2, reps:'15下', tip:'肩胛后收', rest:30, type:'bw', weight:'', hr:'💓 100-120'},
          {name:'手臂绕环', sets:2, reps:'前后10圈', tip:'润滑肩关节', rest:30, type:'bw', weight:'', hr:'💓 100-120'},
          {name:'超人式(轻)', sets:2, reps:'10下', tip:'同时抬起手脚', rest:30, type:'bw', weight:'', hr:'💓 105-125'}
        ],
        main: [
          {name:'单臂哑铃划船', sets:4, reps:'12-15/边', tip:'顶峰收缩1秒', rest:75, type:'db', weight:'10kg/边', hr:'💓 125-145 背阔肌'},
          {name:'宽距哑铃划船', sets:3, reps:'12', tip:'俯身，手肘朝外', rest:60, type:'db', weight:'7.5-10kg/边', hr:'💓 120-140'},
          {name:'哑铃弯举', sets:3, reps:'10', tip:'大臂固定', rest:60, type:'db', weight:'7.5-10kg/边', hr:'💓 115-135 若10kg吃力降重'},
          {name:'锤式弯举', sets:3, reps:'20', tip:'1.5kg小哑铃', rest:45, type:'db', weight:'1.5kg/边', hr:'💓 110-125 小重量高次数'},
          {name:'负重超人式', sets:3, reps:'15', tip:'手持1.5kg', rest:45, type:'db', weight:'1.5kg手持', hr:'💓 115-130 下背'},
          {name:'哑铃耸肩', sets:3, reps:'15', tip:'直上直下', rest:45, type:'db', weight:'10kg/边', hr:'💓 110-125'}
        ],
        cool: [
          {name:'跨胸背肌拉伸', sets:2, reps:'30秒/边', tip:'感受背部', rest:30, type:'str', weight:'', hr:'💓 <100'},
          {name:'门框背阔肌拉伸', sets:2, reps:'30秒/边', tip:'抓住门框', rest:30, type:'str', weight:'', hr:'💓 <100'},
          {name:'二头拉伸', sets:2, reps:'30秒/边', tip:'手背贴墙', rest:30, type:'str', weight:'', hr:'💓 <100'},
          {name:'儿童式', sets:1, reps:'60秒', tip:'深呼吸', rest:60, type:'str', weight:'', hr:'💓 回落'}
        ]
      },
      legs: {
        warm: [
          {name:'蚌式开合', sets:2, reps:'15/边', tip:'激活臀中肌', rest:30, type:'bw', weight:'', hr:'💓 100-120'},
          {name:'臀桥(热身)', sets:2, reps:'15', tip:'臀部推起', rest:30, type:'bw', weight:'', hr:'💓 105-120'},
          {name:'膝盖绕环', sets:2, reps:'顺逆各10圈', tip:'缓慢绕圈', rest:30, type:'bw', weight:'', hr:'💓 95-110'},
          {name:'弓步走热身', sets:2, reps:'10步/边', tip:'感受髋部', rest:30, type:'bw', weight:'', hr:'💓 110-125'}
        ],
        main: [
          {name:'保加利亚分腿蹲', sets:4, reps:'15/边', tip:'自重，只蹲到不痛角度', rest:90, type:'bw', weight:'自重', hr:'💓 130-150 心率易高，注意膝盖'},
          {name:'罗马尼亚硬拉', sets:4, reps:'15', tip:'哑铃贴腿，背平直', rest:75, type:'db', weight:'10kg/边', hr:'💓 125-145 后链王牌'},
          {name:'单腿臀桥(负重)', sets:3, reps:'12/边', tip:'1.5kg放髋部', rest:60, type:'db', weight:'1.5kg', hr:'💓 115-130 臀肌'},
          {name:'蚌式开合(正式)', sets:3, reps:'20/边', tip:'慢速，顶部停2秒', rest:45, type:'bw', weight:'', hr:'💓 110-125'},
          {name:'平板支撑交替抬手', sets:3, reps:'30秒', tip:'核心绷紧', rest:45, type:'bw', weight:'', hr:'💓 115-135 核心'}
        ],
        cool: [
          {name:'股四头肌拉伸', sets:2, reps:'45秒/边', tip:'手拉脚踝', rest:45, type:'str', weight:'', hr:'💓 <100'},
          {name:'腿后腱拉伸', sets:2, reps:'45秒/边', tip:'从髋部折叠', rest:45, type:'str', weight:'', hr:'💓 <100'},
          {name:'鸽子式臀部拉伸', sets:2, reps:'45秒/边', tip:'深度拉伸', rest:45, type:'str', weight:'', hr:'💓 <100'},
          {name:'弓步髋屈肌拉伸', sets:2, reps:'30秒/边', tip:'身体直立', rest:30, type:'str', weight:'', hr:'💓 <100'}
        ]
      }
    };

    let currentDay = 0;
    let dayStates = [[], [], []];
    let activeTimer = null;
    
    const dayContainers = [document.getElementById('day0'), document.getElementById('day1'), document.getElementById('day2')];
    const dayProgressSpan = document.getElementById('dayProgress');

    function playAlarm(){
      try{
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playBeep = (freq, start, duration) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.25, audioCtx.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
          osc.start(audioCtx.currentTime + start);
          osc.stop(audioCtx.currentTime + start + duration);
        };
        playBeep(880, 0, 0.4);
        playBeep(880, 0.6, 0.4);
        playBeep(880, 1.2, 0.4);
      }catch(e){}
    }

    function formatTime(sec){
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function stopActiveTimer(){
      if(activeTimer && activeTimer.interval){
        clearInterval(activeTimer.interval);
        activeTimer.interval = null;
      }
      activeTimer = null;
    }

    function startTimerForExercise(dayIdx, phase, exIdx, restSec, actionName){
      stopActiveTimer();
      let seconds = restSec;
      const updateDisplay = () => {
        const card = document.querySelector(`.ex-card[data-day="${dayIdx}"][data-phase="${phase}"][data-ex="${exIdx}"]`);
        if(card){
          const val = card.querySelector('.timer-value');
          if(val) val.textContent = formatTime(seconds);
        }
      };
      updateDisplay();
      const interval = setInterval(() => {
        if(seconds > 0){
          seconds--;
          updateDisplay();
          if(seconds === 0){
            playAlarm();
            stopActiveTimer();
            renderDay(currentDay);
          }
        } else {
          stopActiveTimer();
          renderDay(currentDay);
        }
      }, 1000);
      activeTimer = { dayIdx, phase, exIdx, interval, seconds, restSec };
    }

    function pauseActiveTimer(){
      if(activeTimer && activeTimer.interval){
        clearInterval(activeTimer.interval);
        activeTimer.interval = null;
      }
    }

    function resumeActiveTimer(){
      if(activeTimer && !activeTimer.interval){
        const { dayIdx, phase, exIdx, restSec } = activeTimer;
        const card = document.querySelector(`.ex-card[data-day="${dayIdx}"][data-phase="${phase}"][data-ex="${exIdx}"]`);
        let cur = restSec;
        if(card){
          const txt = card.querySelector('.timer-value')?.textContent;
          if(txt){
            const parts = txt.split(':');
            cur = parseInt(parts[0])*60 + parseInt(parts[1]);
          }
        }
        startTimerForExercise(dayIdx, phase, exIdx, cur, '');
      }
    }

    function resetTimerForExercise(dayIdx, phase, exIdx, restSec){
      stopActiveTimer();
      const card = document.querySelector(`.ex-card[data-day="${dayIdx}"][data-phase="${phase}"][data-ex="${exIdx}"]`);
      if(card){
        card.querySelector('.timer-value').textContent = formatTime(restSec);
      }
    }

    function calcProgress(dayIdx){
      let total=0, done=0;
      const state = dayStates[dayIdx];
      for(let ph of ['warm','main','cool']){
        const exs = EXERCISES[DAYS[dayIdx]][ph];
        const phState = state[ph] || [];
        exs.forEach((ex,i)=> {
          total += ex.sets;
          if(phState[i]) done += phState[i].filter(v=>v).length;
        });
      }
      return {total, done};
    }

    function updateProgressLabel(){
      const {total, done} = calcProgress(currentDay);
      dayProgressSpan.textContent = `${done}/${total}组`;
    }

    function renderDay(dayIdx){
      const dayKey = DAYS[dayIdx];
      const exData = EXERCISES[dayKey];
      const state = dayStates[dayIdx];
      let html = '';
      ['warm','main','cool'].forEach(phase => {
        const phaseName = phase==='warm'?'🔥 热身':(phase==='main'?'💪 主训练':'🧘 拉伸');
        const phaseTime = phase==='warm'?'10分钟':(phase==='main'?'40分钟':'10分钟');
        const dotClass = phase==='warm'?'dot-warm':(phase==='main'?'dot-main':'dot-cool');
        html += `<div class="phase"><div class="phase-header"><div class="phase-dot ${dotClass}"></div><span class="phase-title">${phaseName}</span><span class="phase-time">${phaseTime}</span></div>`;
        const exercises = exData[phase];
        const phaseState = state[phase] || [];
        exercises.forEach((ex, exIdx) => {
          const badgeClass = ex.type==='db'?'b-db':(ex.type==='bw'?'b-bw':'b-str');
          const badgeText = ex.type==='db'?'哑铃':(ex.type==='bw'?'徒手':'拉伸');
          const doneCount = phaseState[exIdx] ? phaseState[exIdx].filter(v=>v).length : 0;
          const isActive = activeTimer && activeTimer.dayIdx===dayIdx && activeTimer.phase===phase && activeTimer.exIdx===exIdx;
          const timerVal = isActive ? formatTime(activeTimer.seconds) : formatTime(ex.rest);
          
          html += `<div class="ex-card" data-day="${dayIdx}" data-phase="${phase}" data-ex="${exIdx}">`;
          html += `<div class="ex-top"><span class="ex-num">${String(exIdx+1).padStart(2,'0')}</span><span class="ex-name">${ex.name}</span><span class="ex-badge ${badgeClass}">${badgeText}</span>`;
          if(ex.weight) html += `<span class="ex-weight">${ex.weight}</span>`;
          html += `</div>`;
          html += `<div class="ex-detail">${ex.sets}组 × ${ex.reps}</div>`;
          html += `<div class="ex-tip">💡 ${ex.tip}</div>`;
          if(ex.hr) html += `<div class="ex-hr">${ex.hr}</div>`;
          
          html += `<div class="set-tracker">`;
          for(let s=0; s<ex.sets; s++){
            const done = phaseState[exIdx] ? phaseState[exIdx][s] : false;
            html += `<div class="set-dot ${done?'completed':''}" data-day="${dayIdx}" data-phase="${phase}" data-ex="${exIdx}" data-set="${s}">`;
            html += `<span class="set-num">${s+1}</span>`;
            html += `<span class="set-rep">${ex.reps.includes('/')?ex.reps.split('/')[0]:ex.reps}</span>`;
            html += `</div>`;
          }
          html += `<span class="ex-progress">${doneCount}/${ex.sets}</span></div>`;
          
          html += `<div class="card-timer"><div class="timer-info"><span class="timer-label-small">⏳ ${phase==='cool'?'拉伸':'休息'}</span><span class="timer-value">${timerVal}</span></div>`;
          html += `<div class="timer-actions">`;
          html += `<button class="timer-btn timer-playpause" data-day="${dayIdx}" data-phase="${phase}" data-ex="${exIdx}">${isActive && activeTimer.interval?'⏸':'▶'}</button>`;
          html += `<button class="timer-btn timer-reset" data-day="${dayIdx}" data-phase="${phase}" data-ex="${exIdx}" data-rest="${ex.rest}">↺</button>`;
          html += `</div></div></div>`;
        });
        html += `</div>`;
      });
      if(dayIdx===0) html += `<div class="note-box">📊 上胸强化日 · 注意下放4秒 · 心率＞155延长休息</div>`;
      else if(dayIdx===1) html += `<div class="note-box">📊 背部厚度日 · 顶峰收缩 · 弯举若吃力降重</div>`;
      else html += `<div class="note-box">🦵 膝盖友好下肢 · 硬拉/臀桥为主 · 分腿蹲只到不痛角度</div>`;
      dayContainers[dayIdx].innerHTML = html;
      updateProgressLabel();
    }

    function loadStates(){
      try{
        const saved = localStorage.getItem('eddie_hr_v1');
        if(saved) dayStates = JSON.parse(saved);
        else initEmpty();
      }catch(e){ initEmpty(); }
    }
    function initEmpty(){
      dayStates = DAYS.map(d => {
        const st = {warm:[],main:[],cool:[]};
        ['warm','main','cool'].forEach(p => {
          EXERCISES[d][p].forEach(ex => st[p].push(new Array(ex.sets).fill(false)));
        });
        return st;
      });
    }
    function saveStates(){ localStorage.setItem('eddie_hr_v1', JSON.stringify(dayStates)); }

    function handleClick(e){
      const dot = e.target.closest('.set-dot');
      if(dot){
        const day=dot.dataset.day, phase=dot.dataset.phase, ex=dot.dataset.ex, set=dot.dataset.set;
        const dayIdx=parseInt(day);
        const exData = EXERCISES[DAYS[dayIdx]][phase][ex];
        const stateArr = dayStates[dayIdx][phase][ex];
        const was = stateArr[set];
        stateArr[set] = !was;
        if(!was && exData.rest > 0){
          startTimerForExercise(dayIdx, phase, ex, exData.rest, exData.name);
        }
        saveStates();
        renderDay(dayIdx);
        return;
      }
      const playBtn = e.target.closest('.timer-playpause');
      if(playBtn){
        const day=playBtn.dataset.day, phase=playBtn.dataset.phase, ex=playBtn.dataset.ex;
        const dayIdx=parseInt(day);
        const exData = EXERCISES[DAYS[dayIdx]][phase][ex];
        if(activeTimer && activeTimer.dayIdx===dayIdx && activeTimer.phase===phase && activeTimer.exIdx===ex){
          activeTimer.interval ? pauseActiveTimer() : resumeActiveTimer();
        } else {
          startTimerForExercise(dayIdx, phase, ex, exData.rest, exData.name);
        }
        renderDay(dayIdx);
        return;
      }
      const resetBtn = e.target.closest('.timer-reset');
      if(resetBtn){
        const day=resetBtn.dataset.day, phase=resetBtn.dataset.phase, ex=resetBtn.dataset.ex;
        const rest = parseInt(resetBtn.dataset.rest);
        resetTimerForExercise(parseInt(day), phase, ex, rest);
        renderDay(parseInt(day));
      }
    }

    function resetCurrentDay(){
      if(confirm('重置今日所有组进度？')){
        stopActiveTimer();
        const d = currentDay;
        dayStates[d] = {warm:[],main:[],cool:[]};
        ['warm','main','cool'].forEach(p => {
          EXERCISES[DAYS[d]][p].forEach(ex => dayStates[d][p].push(new Array(ex.sets).fill(false)));
        });
        saveStates();
        renderDay(d);
      }
    }

    function switchDay(n){
      currentDay = n;
      stopActiveTimer();
      document.querySelectorAll('.day-btn').forEach((b,i)=> b.classList.toggle('active', i===n));
      dayContainers.forEach((c,i)=> c.style.display = i===n?'block':'none');
      renderDay(n);
    }

    function init(){
      loadStates();
      renderDay(0);
      dayContainers.forEach(c => c.addEventListener('click', handleClick));
      document.getElementById('resetDayBtn').addEventListener('click', resetCurrentDay);
      window.switchDay = switchDay;
    }
    init();
  })();
</script>
</body>
</html>
